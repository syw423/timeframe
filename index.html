<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chrono — 时光相册</title>
  <link rel="stylesheet" href="style.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif-js.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- 欢迎界面 -->
  <div id="welcome">
    <div class="welcome-content">
      <div class="welcome-header">
        <div class="logo-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1>我的相册</h1>
        <p class="welcome-subtitle">导入照片，管理回忆</p>
        <button id="welcome-import-btn" class="import-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          导入照片
        </button>
      </div>
    </div>
  </div>

  <!-- 导入选项弹窗 -->
  <div id="import-modal" class="import-modal">
    <div class="import-modal-glass">
      <div class="import-option" id="import-folder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>导入文件夹</span>
      </div>
      <div class="import-option" id="import-files">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <span>选择照片</span>
      </div>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="folderInput" webkitdirectory multiple style="position:fixed;top:-1000px;left:-1000px;">
  <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp,image/bmp,image/heic,video/mp4,video/quicktime,video/webm,video/x-msvideo" style="position:fixed;top:-1000px;left:-1000px;">

  <!-- 顶部按钮 -->
  <div class="top-bar">
    <!-- 左侧导航栏 -->
    <div class="nav-tabs">
      <button id="nav-photos" class="nav-tab active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        所有照片
      </button>
      <button id="nav-tags" class="nav-tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7"/>
        </svg>
        分类
      </button>
      <button id="date-trigger" class="nav-tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        选择日期
      </button>
    </div>
    <button id="add-photos-btn" class="top-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      添加照片
    </button>
    <div class="layout-toggle">
      <button id="layout-grid" class="layout-btn active" title="网格视图">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button id="layout-carousel" class="layout-btn" title="轮播视图">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2"/>
          <line x1="7" y1="4" x2="7" y2="20"/>
          <line x1="17" y1="4" x2="17" y2="20"/>
        </svg>
      </button>
      <button id="layout-three" class="layout-btn" title="3D 手势">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/>
          <path d="M12 12l8-4.5"/>
          <path d="M12 12v10"/>
          <path d="M4 7.5l8 4.5"/>
        </svg>
      </button>
      <button id="layout-book" class="layout-btn" title="翻页书">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
      </button>
    </div>
    <div id="arrangement-bar" class="arrangement-bar" style="display:none">
      <button class="arr-btn active" data-arr="sphere">球体</button>
      <button class="arr-btn" data-arr="helix">螺旋</button>
      <button class="arr-btn" data-arr="cube">立方体</button>
      <button class="arr-btn" data-arr="wave">波浪</button>
    </div>
  </div>

  <!-- 日期选择弹窗 -->
  <div id="date-modal" class="date-modal">
    <div class="date-modal-glass">
      <button id="date-modal-close" class="date-modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="dm-label">选择日期</span>
      <div class="dm-calendar">
        <div class="dm-cal-nav">
          <button id="cal-prev" class="dm-cal-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span id="cal-title" class="dm-cal-title">----年--月</span>
          <button id="cal-next" class="dm-cal-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
        <div class="dm-cal-week">
          <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div id="cal-grid" class="dm-cal-grid"></div>
      </div>
      <div class="dm-actions">
        <button id="picker-all" class="dm-btn dm-btn-all active">全部照片</button>
      </div>
    </div>
  </div>

  <!-- 状态提示 -->
  <div id="status">点击「导入照片」开始</div>

  <!-- CSS 3D 环形画廊容器 -->
  <div id="gallery-3d"></div>

  <!-- 标签主页容器 -->
  <div id="tags-home-container" class="tags-home-container" style="display:none"></div>

  <!-- 标签详情页容器 -->
  <div id="tag-detail-container" class="tag-detail-container" style="display:none"></div>

  <!-- 照片详情面板 -->
  <div id="photo-detail" class="photo-detail">
    <button id="detail-close" class="detail-close" title="关闭 (ESC)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="detail-scene">
      <div class="detail-frame">
        <img id="detail-img" src="" alt="照片">
        <video id="detail-video" controls playsinline preload="metadata"></video>
      </div>
      <div class="detail-aura">
        <div id="detail-date" class="da-line da-date">--</div>
        <div id="detail-note" class="da-line da-note">--</div>
        <div id="detail-filename" class="da-line da-file">--</div>
        <div id="detail-tags" class="detail-tags-wrapper"></div>
        <button id="detail-delete" class="detail-delete-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          删除
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
