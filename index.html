<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TimeFrame · 时光相册</title>
  <link rel="stylesheet" href="style.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif-js.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body data-theme="dark">
  <!-- 主题切换按钮 -->
  <button id="theme-toggle-btn" class="theme-toggle-btn" title="切换主题">
    <span class="theme-icon-dark">🌙</span>
    <span class="theme-icon-light">☀️</span>
  </button>

  <!-- ============================================
       1. 封面（无导航栏）
       ============================================ -->
  <div id="cover-page" class="cover-page">
    <div class="cover-bg"></div>
    <div class="cover-content">
      <div class="cover-tag">TIME FRAME</div>
      <h1 class="cover-title">记忆之廊</h1>
      <p class="cover-slogan">留住时光的每一帧</p>
      <div class="cover-btn-group">
        <button id="cover-enter-btn" class="btn-primary">
          进入相册
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ============================================
       2. 主页（分区卡片 + 日期搜索）
       ============================================ -->
  <div id="home-page" class="home-page" style="display:none">
    <!-- 右上角日期搜索按钮 -->
    <button id="date-search-btn" class="top-date-btn" title="按日期搜索">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      按日期搜索
    </button>

    <!-- 主页头部：返回封面 + 标题 -->
    <header class="home-header">
      <button id="back-to-cover-btn" class="btn-icon" title="返回封面">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="home-title">TimeFrame</h1>
      <div class="home-header-spacer"></div>
    </header>

    <!-- 分区卡片 -->
    <div class="zone-grid">
      <div class="zone-card" data-zone="photos">
        <div>
          <div class="zone-icon">📷</div>
          <div class="zone-name">所有照片</div>
          <div class="zone-desc">查看、导入、标签管理</div>
        </div>
        <div class="zone-stat"><span id="zone-photos-count">0</span> 张照片</div>
      </div>

      <div class="zone-card" data-zone="tags">
        <div>
          <div class="zone-icon">🏷️</div>
          <div class="zone-name">分类</div>
          <div class="zone-desc">按月份/自定义标签组织</div>
        </div>
        <div class="zone-stat"><span id="zone-tags-count">0</span> 个分类</div>
      </div>

      <div class="zone-card" data-zone="browse">
        <div>
          <div class="zone-icon">🌌</div>
          <div class="zone-name">浏览模式</div>
          <div class="zone-desc">沉浸式浏览 · 4 种布局</div>
        </div>
        <div class="zone-stat">网格 / 轮播 / 3D / 翻页书</div>
      </div>

      <div class="zone-card zone-card-import" data-zone="import">
        <div>
          <div class="zone-icon">⬆️</div>
          <div class="zone-name">导入</div>
          <div class="zone-desc">导入文件夹或选择照片</div>
        </div>
        <div class="zone-stat">点击导入</div>
      </div>
    </div>
  </div>

  <!-- ============================================
       3. 照片视图（日常管理 + 浏览模式）
       ============================================ -->
  <div id="photos-page" class="photos-page" style="display:none">
    <!-- 顶部工具栏 -->
    <div class="top-bar">
      <button id="back-to-home-btn" class="btn-icon" title="返回主页">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div id="browse-layout-toggle" class="layout-toggle" style="display:none">
        <button class="layout-btn active" data-layout="grid" title="网格">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
        <button class="layout-btn" data-layout="carousel" title="轮播">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2"/>
            <line x1="7" y1="4" x2="7" y2="20"/>
            <line x1="17" y1="4" x2="17" y2="20"/>
          </svg>
        </button>
        <button class="layout-btn" data-layout="three" title="3D">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/>
            <path d="M12 12l8-4.5"/>
            <path d="M12 12v10"/>
            <path d="M4 7.5l8 4.5"/>
          </svg>
        </button>
        <button class="layout-btn" data-layout="book" title="翻页书">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
          </svg>
        </button>
      </div>

      <div id="arrangement-bar" class="arrangement-bar" style="display:none">
        <button class="arr-btn active" data-arr="sphere">球体</button>
        <button class="arr-btn" data-arr="helix">螺旋</button>
        <button class="arr-btn" data-arr="cube">立方体</button>
        <button class="arr-btn" data-arr="wave">波浪</button>
      </div>

      <div class="top-bar-spacer"></div>
    </div>

    <!-- 状态提示 -->
    <div id="status">点击「导入」开始</div>

    <!-- 3D 画廊容器 -->
    <div id="gallery-3d"></div>
  </div>

  <!-- 导入选项弹窗 -->
  <div id="import-modal" class="import-modal">
    <div class="import-modal-glass">
      <div class="import-option" id="import-folder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span>导入文件夹</span>
      </div>
      <div class="import-option" id="import-files">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <span>选择照片</span>
      </div>
    </div>
  </div>

  <!-- 浏览模式选择弹窗 -->
  <div id="browse-modal" class="browse-modal">
    <div class="browse-modal-glass">
      <button id="browse-modal-close" class="browse-modal-close btn-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="browse-title">选择要浏览的内容</div>
      <div class="browse-options" id="browse-options-container">
        <!-- 由 script.js 动态填充 -->
      </div>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="folderInput" webkitdirectory multiple style="position:fixed;top:-1000px;left:-1000px;">
  <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp,image/bmp,image/heic,video/mp4,video/quicktime,video/webm,video/x-msvideo" style="position:fixed;top:-1000px;left:-1000px;">

  <!-- 日期选择弹窗 -->
  <div id="date-modal" class="date-modal">
    <div class="date-modal-glass">
      <button id="date-modal-close" class="date-modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="dm-label">选择日期</span>
      <div class="dm-calendar">
        <div class="dm-cal-nav">
          <button id="cal-prev" class="dm-cal-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span id="cal-title" class="dm-cal-title">----年--月</span>
          <button id="cal-next" class="dm-cal-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
        <div class="dm-cal-week">
          <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div id="cal-grid" class="dm-cal-grid"></div>
      </div>
      <div class="dm-actions">
        <button id="picker-all" class="dm-btn dm-btn-all active">全部照片</button>
      </div>
    </div>
  </div>

  <!-- 标签主页容器（直接作为 zone-card 子视图,不占据主页） -->
  <div id="tags-home-container" class="tags-home-container" style="display:none"></div>

  <!-- 标签详情页容器 -->
  <div id="tag-detail-container" class="tag-detail-container" style="display:none"></div>

  <!-- 照片详情面板 -->
  <div id="photo-detail" class="photo-detail">
    <button id="detail-close" class="detail-close" title="关闭 (ESC)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="detail-scene">
      <div class="detail-frame">
        <img id="detail-img" src="" alt="照片">
        <video id="detail-video" controls playsinline preload="metadata"></video>
      </div>
      <div class="detail-aura">
        <div id="detail-date" class="da-line da-date">--</div>
        <div id="detail-note" class="da-line da-note">--</div>
        <div id="detail-filename" class="da-line da-file">--</div>
        <div id="detail-tags" class="detail-tags-wrapper"></div>
        <button id="detail-delete" class="detail-delete-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          删除
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
